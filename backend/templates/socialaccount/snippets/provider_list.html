{% load socialaccount %}
{% get_providers as socialaccount_providers %}

{% for provider in socialaccount_providers %}
{% if provider.id == "google" %}
<a title="{{provider.name}}" class="google-btn socialaccount_provider {{provider.id}}"
    href="{% provider_login_url provider.id process=process scope=scope auth_params=auth_params %}">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" height="20"
        alt="G">
    <span>Sign in with Google</span>
</a>
{% else %}
<a title="{{provider.name}}" class="socialaccount_provider {{provider.id}} btn btn-outline-secondary w-100"
    href="{% provider_login_url provider.id process=process scope=scope auth_params=auth_params %}">
    {{provider.name}}
</a>
{% endif %}
{% endfor %}
