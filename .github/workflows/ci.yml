name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  SECRET_KEY: 'ci-test-secret-key-not-for-production'
  DEBUG: 'True'
  DB_ENGINE: 'django.db.backends.sqlite3'
  DB_NAME: 'test_db.sqlite3'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Django system checks
        run: python manage.py check
      
      - name: Run migrations
        run: python manage.py migrate --run-syncdb
      
      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing -v
      
      - name: Check coverage threshold
        run: |
          coverage report --fail-under=50
        continue-on-error: true

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
      
      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=venv,migrations,__pycache__,staticfiles
        continue-on-error: true

  security:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety
      
      - name: Check for known vulnerabilities
        run: safety check -r requirements.txt
        continue-on-error: true
      
      - name: Django deployment check
        env:
          DEBUG: 'False'
          ALLOWED_HOSTS: 'localhost'
        run: python manage.py check --deploy 2>&1 || true
