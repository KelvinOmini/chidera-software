{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Inventory Management System</title>
    <!-- Third Party CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Background decorative elements */
        .decoration-1, .decoration-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }
        
        .decoration-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }
        
        .decoration-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: -200px;
            right: -150px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            z-index: 10;
        }
        
        .brand-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        /* Floating animation for the container */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- Background Decor -->
    <div class="decoration-1"></div>
    <div class="decoration-2"></div>

    <div class="login-container glass-card align-items-center animate-fade-in floating">
        <div class="text-center mb-4">
            <i class="bi bi-box-seam brand-icon"></i>
            <h2 class="fw-bold text-primary mb-1">Welcome Back</h2>
            <p class="text-secondary small">Smart Inventory Management System</p>
        </div>

        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show border-0 bg-{{ message.tags }}-subtle text-{{ message.tags }}" role="alert">
                <i class="bi bi-info-circle me-2"></i>{{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="needs-validation">
            {% csrf_token %}
            
            <div class="mb-3 position-relative">
                <label for="id_username" class="form-label text-secondary small fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-primary">
                        <i class="bi bi-person"></i>
                    </span>
                    {{ form.username }}
                </div>
            </div>

            <div class="mb-4 position-relative">
                <label for="id_password" class="form-label text-secondary small fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-primary">
                        <i class="bi bi-shield-lock"></i>
                    </span>
                    {{ form.password }}
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    {{ form.remember_me }}
                    <label class="form-check-label text-secondary small" for="id_remember_me">
                        Remember me
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-glass w-100 py-2 d-flex justify-content-center align-items-center gap-2">
                Sign In <i class="bi bi-arrow-right"></i>
            </button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check system theme config for login page explicitly
        const currentTheme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);
        
        // Add form styling classes
        document.querySelectorAll('.form-control').forEach(el => {
            el.classList.add('form-glass', 'border-start-0');
            el.addEventListener('focus', () => {
                el.previousElementSibling.classList.add('border-primary');
            });
            el.addEventListener('blur', () => {
                el.previousElementSibling.classList.remove('border-primary');
            });
        });
    </script>
</body>
</html>
